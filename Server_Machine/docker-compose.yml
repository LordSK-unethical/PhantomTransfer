services:
  transfer-server:
    build: .
    image: phantom-transfer-server-tailscale:latest
    container_name: phantom-transfer-server-tailscale
    volumes:
      - ./rooms:/app/rooms
      - tailscale-state:/var/lib/tailscale
    restart: unless-stopped
    expose:
      - "5000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY:-}
    command: >
      sh -c '
        tailscaled &
        sleep 2 &&
        tailscale up --authkey="$$TS_AUTH_KEY" --accept-routes 2>/dev/null || tailscale up --accept-routes 2>/dev/null &&
        echo "Server IP: $$(tailscale ip -4)" &&
        java -cp . server.ServerMain
      '

volumes:
  tailscale-state:
